<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#7ec8e3">
<title>Monkey Grove 🍌</title>
<meta name="description" content="A cozy island adventure that brings the numbers home. Een knus eiland-avontuur dat de getallen thuisbrengt.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐵</text></svg>">
  <script type="module" crossorigin src="/monkeygrove/assets/index-DgjW1xXr.js"></script>
  <link rel="stylesheet" crossorigin href="/monkeygrove/assets/index-B8qllJWI.css">
</head>
<body>
<canvas id="game-canvas"></canvas>

<div id="ui">
  <!-- in-play HUD -->
  <div id="hud" class="hidden">
    <div id="hud-top-left">
      <div class="chip" id="chip-bananas"><span class="chip-icon">🍌</span><span id="banana-count">0</span></div>
      <div class="chip" id="chip-streak"><span class="chip-icon">🔥</span><span id="streak-count">0</span></div>
    </div>
    <div id="hud-top-right">
      <button class="round-btn" id="btn-home" title="Home">🏝️</button>
      <button class="round-btn" id="btn-settings" title="Settings">⚙️</button>
    </div>
    <div id="hud-bottom-left">
      <div class="chip egg-chip" id="chip-egg"><span class="chip-icon">🥚</span><div id="egg-bar"><div id="egg-fill"></div></div></div>
    </div>
    <div id="hud-bottom-right">
      <button class="round-btn big" id="btn-hint" title="Hint">💡</button>
      <button class="round-btn big hidden" id="btn-action" title="Action">✋</button>
    </div>
    <div id="combo" class="hidden">x<span id="combo-count">2</span></div>
  </div>

  <!-- equation banner -->
  <div id="banner" class="hidden"><div id="banner-instruction"></div><div id="banner-equation"></div></div>

  <!-- verb helper panel (share counts / array size) -->
  <div id="verb-panel" class="hidden"></div>

  <!-- visual model fallback panel (when the floor can't host the model) -->
  <div id="model-panel" class="hidden"></div>

  <!-- Mimi speech bubble (tap or Space/Enter to continue, Zelda-style) -->
  <div id="bubble" class="hidden"><div id="bubble-face">🐵</div><div id="bubble-text"></div><div id="bubble-next" class="hidden">▼</div></div>

  <!-- toasts (rewards, gems, streak) -->
  <div id="toasts"></div>

  <!-- full-screen DOM screens (title, shop, gems, pets, results, settings, parents, duel) -->
  <div id="screens"></div>
</div>

</body>
</html>
